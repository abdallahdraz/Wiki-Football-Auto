name: Daily Wikipedia Updater

on:
  schedule:
    - cron: '0 3 * * *' # السيرفر بيصحى لحاله كل يوم الساعة 3:00 الفجر بتوقيت جرينتش
  workflow_dispatch: # زر التشغيل اليدوي للاختبار في أي وقت

jobs:
  update-db:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v3

      - name: Set up Python
        uses: actions/setup-python@v4
        with:
          python-version: '3.11' # حدّثنا الإصدار لأحدث نسخة مستقرة

      - name: Install dependencies
        run: |
          pip install google-api-python-client google-auth-httplib2 google-auth-oauthlib
          pip install requests beautifulsoup4 lxml

      - name: Run Updater Script
        env:
          GCP_CREDENTIALS: ${{ secrets.GCP_CREDENTIALS }}
          DRIVE_FILE_ID: ${{ secrets.DRIVE_FILE_ID }}
        run: python updater.py
